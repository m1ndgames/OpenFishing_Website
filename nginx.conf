server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/manifest+json;

    # nginx's bundled mime.types already maps .svg → image/svg+xml and .webp,
    # .woff2, etc., so we rely on that rather than overriding the types block
    # (which would drop the CSS/JS content types).

    # Static assets emitted by Astro are content-hashed → cache hard.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Other static media — cache a while.
    location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # HTML should always be revalidated so deploys show up immediately.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
