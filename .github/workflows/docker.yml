name: Build & Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Only authenticate to the registry when we're going to push (main).
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/m1ndgames/openfishing-website
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # On PRs this builds (and loads) the image without pushing, validating the
      # Dockerfile + nginx serve. On main it pushes to GHCR.
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke test: run the container and confirm nginx serves the landing page
      # and a deep /docs route (only meaningful when the image is loaded, i.e. PRs).
      - name: Smoke test the container
        if: github.event_name == 'pull_request'
        env:
          IMAGE: ${{ steps.meta.outputs.version && format('ghcr.io/m1ndgames/openfishing-website:{0}', steps.meta.outputs.version) }}
        run: |
          docker run -d --name of-web -p 8080:80 "$IMAGE"
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:8080/ >/dev/null; then break; fi
            sleep 2
          done
          echo "Landing:"; curl -fsS -o /dev/null -w "%{http_code}\n" http://localhost:8080/
          echo "Docs deep link:"; curl -fsS -o /dev/null -w "%{http_code}\n" http://localhost:8080/docs/getting-started/introduction/
          echo "SVG mime:"; curl -fsS -o /dev/null -w "%{content_type}\n" http://localhost:8080/favicon.svg
          docker rm -f of-web

      - name: Scan image for vulnerabilities
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/m1ndgames/openfishing-website:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload scan results to Security tab
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
