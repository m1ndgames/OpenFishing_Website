version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"
      prefix-development: "fix"
    groups:
      astro:
        patterns: ["astro", "@astrojs/*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*"]
      tooling:
        patterns: ["playwright", "sharp", "axe-core", "typescript"]
      types:
        patterns: ["@types/*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"
